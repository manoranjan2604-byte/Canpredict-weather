<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CanPredict AI – Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #020408 0%, #000000 100%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: #ffffff;
        text-align: center;
        padding: 24px;
      }
      .card {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0.01) 100%);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 20px;
        padding: 40px 32px;
        max-width: 360px;
        box-shadow: 0 10px 30px rgba(124, 58, 237, 0.15);
      }
      .logo {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        background: linear-gradient(135deg, #7c3aed, #3b82f6);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px;
        font-size: 28px;
      }
      h1 { font-size: 18px; margin: 0 0 8px; }
      p { font-size: 14px; color: #94a3b8; margin: 0 0 20px; }
      button {
        background: linear-gradient(135deg, #7c3aed, #3b82f6);
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">🌩️</div>
      <h1>You're offline</h1>
      <p>CanPredict AI needs an internet connection to fetch live weather data and AI insights. Pages you've already visited may still be available.</p>
      <button onclick="location.reload()">Try Again</button>
    </div>
  </body>
</html>
